server:
  port: 8082

spring:
  application:
    name: HOSPITAL-SERVICE   # 🔥 जरूरी (Eureka में यही दिखेगा)

  datasource:
    url: jdbc:mysql://localhost:3306/hms_hospital_db
    username: root
    password: test

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka   # 🔥 Eureka URL

  instance:
    prefer-ip-address: true   # optional (recommended)