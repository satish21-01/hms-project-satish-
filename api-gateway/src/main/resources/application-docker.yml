server:
  port: 8080

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:

        - id: user-service
          uri: http://user-service:8081
          predicates:
            - Path=/api/users/**

        - id: appointment-service
          uri: http://appointment-service:8083
          predicates:
            - Path=/api/appointments/**